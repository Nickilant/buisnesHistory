services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-casebook}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-casebook}']
      interval: 5s
      timeout: 5s
      retries: 10

  updater:
    build: ./services/updater
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://app:app@postgres:5432/casebook}
      CASEBOOK_API_URL: ${CASEBOOK_API_URL:-https://api3.casebook.ru/arbitrage/tracking/events/documents}
      CASEBOOK_API_KEY: ${CASEBOOK_API_KEY}
      CASEBOOK_API_VERSION: ${CASEBOOK_API_VERSION:-2}
      CASEBOOK_AUTH_SCHEME: ${CASEBOOK_AUTH_SCHEME:-auto}
      PAGE_SIZE: ${PAGE_SIZE:-100}
      SCHEDULER_HOUR_MSK: ${SCHEDULER_HOUR_MSK:-23}
      SCHEDULER_MINUTE_MSK: ${SCHEDULER_MINUTE_MSK:-50}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FULL_SYNC_SECRET: ${FULL_SYNC_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8001:8001'

  api:
    build: ./services/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://app:app@postgres:5432/casebook}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXP_MINUTES: ${JWT_EXP_MINUTES:-720}
      ALLOW_LOCAL_DEV_AUTH: ${ALLOW_LOCAL_DEV_AUTH:-true}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      UPDATER_SERVICE_URL: ${UPDATER_SERVICE_URL:-http://updater:8001}
      FULL_SYNC_SECRET: ${FULL_SYNC_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8000:8000'

  frontend:
    build: ./frontend
    environment:
      FRONTEND_API_URL: ${FRONTEND_API_URL:-/api}
      CASE_NUMBER_FIELDS: ${CASE_NUMBER_FIELDS:-UF_CRM_1708426613594,UF_CRM_CASE_NUMBER,UF_CRM_1699999999,CASE_NUMBER}
    depends_on:
      api:
        condition: service_started
    ports:
      - '8080:8080'

volumes:
  postgres_data:
